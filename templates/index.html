<!DOCTYPE html>
<html>
<head>
<title>Vehicle Detection YOLOv8</title>
</head>

<body style="text-align:center; font-family:Arial">

<h1>Vehicle Detection using YOLOv8</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Detect</button>
</form>

<br>

{% if result_img %}
<h2>Detection Result</h2>
<img src="{{ url_for('static', filename=result_img) }}" width="800">
{% endif %}

</body>
</html>
