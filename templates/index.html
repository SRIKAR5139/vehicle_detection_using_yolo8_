<!DOCTYPE html>
<html>
<head>
<title>Vehicle Detection YOLOv8</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}

h1{
    margin-top:40px;
}

button{
    padding:10px 20px;
    font-size:16px;
}

img{
    margin-top:20px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>Vehicle Detection using YOLOv8</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Detect</button>

</form>

{% if result_img %}

<h2>Detection Result</h2>

<img src="{{ url_for('static', filename=result_img) }}" width="800">

{% endif %}

</body>
</html>
